aid: yugabytedb
name: YugabyteDB
description: YugabyteDB is a distributed PostgreSQL-compatible SQL database for cloud-native and mission-critical applications.
  It is delivered as open-source YugabyteDB Core, the fully managed YugabyteDB Aeon DBaaS, and the self-managed YugabyteDB
  Anywhere control plane, with REST APIs for programmatic management of accounts, projects, clusters, universes, backups,
  restores, read replicas, allow lists, and maintenance windows.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Cloud Database
  - Database
  - DBaaS
  - Distributed SQL
  - PostgreSQL
created: '2026-05-03'
modified: '2026-05-19'
url: https://raw.githubusercontent.com/api-evangelist/yugabytedb/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: yugabytedb:aeon
    name: YugabyteDB Aeon REST API
    description: The YugabyteDB Aeon REST API provides programmatic access to the fully managed YugabyteDB cloud database service.
      It is used to deploy and manage clusters and read replicas, schedule and run on-demand backups and restores, manage IP
      allow lists, configure maintenance windows, and set up monitoring and alerts. All paths are scoped to an account and project,
      and authentication uses API keys passed as bearer tokens in the Authorization header.
    humanURL: https://docs.yugabyte.com/stable/yugabyte-cloud/managed-automation/managed-api/
    baseURL: https://cloud.yugabyte.com/api/public/v1
