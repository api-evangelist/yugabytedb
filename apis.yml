aid: yugabytedb
url: https://raw.githubusercontent.com/api-evangelist/yugabytedb/refs/heads/main/apis.yml
apis:
  - aid: yugabytedb:aeon-api
    name: YugabyteDB Aeon REST API
    tags:
      - Database
      - Cloud
      - Distributed SQL
      - Cluster Management
      - REST
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://cloud.yugabyte.com/api/public/v1
    humanURL: https://docs.yugabyte.com/stable/yugabyte-cloud/managed-automation/managed-api/
    properties:
      - url: https://docs.yugabyte.com/stable/yugabyte-cloud/managed-automation/managed-api/
        type: Documentation
      - url: https://api-docs.yugabyte.com/docs/managed-apis/9u5yqnccbe8lk-yugabyte-db-aeon-rest-api
        type: Documentation
      - url: openapi/yugabytedb-aeon-openapi.yml
        type: OpenAPI
    description: >-
      The YugabyteDB Aeon REST API provides programmatic access to YugabyteDB's
      fully managed cloud database service. Developers and operators can use it
      to deploy and manage database clusters, configure read replicas, schedule
      and execute on-demand backups and restores, and set up monitoring and
      alerts. The API supports automation workflows alongside the Terraform
      Provider and ybm CLI, enabling infrastructure-as-code patterns for
      managing cloud database deployments. Authentication is performed using
      API keys passed as bearer tokens in request headers.

  - aid: yugabytedb:anywhere-api
    name: YugabyteDB Anywhere REST API
    tags:
      - Database
      - Self-Managed
      - Distributed SQL
      - Universe Management
      - REST
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com/api/v1
    humanURL: https://docs.yugabyte.com/stable/yugabyte-platform/anywhere-automation/anywhere-api/
    properties:
      - url: https://docs.yugabyte.com/stable/yugabyte-platform/anywhere-automation/anywhere-api/
        type: Documentation
      - url: https://api-docs.yugabyte.com/docs/yugabyte-platform/6e6672ea4b926-yugabyte-db-anywhere-ap-is
        type: Documentation
      - url: openapi/yugabytedb-anywhere-openapi.yml
        type: OpenAPI
    description: >-
      The YugabyteDB Anywhere REST API enables programmatic management of
      self-managed YugabyteDB deployments through the YugabyteDB Anywhere
      (formerly Yugabyte Platform) control plane. It supports creating and
      managing provider configurations, deploying and managing universes,
      pausing and resuming universes, performing software upgrades, executing
      backups and restores, and resizing nodes. The API base URL follows the
      pattern http://<yba_host>/api/v1/ and requires authentication via the
      X-AUTH-YW-API-TOKEN HTTP header. This API is intended for teams running
      YugabyteDB on their own cloud or on-premises infrastructure who need
      automation beyond what the UI provides.

  - aid: yugabytedb:ysql-api
    name: YugabyteDB YSQL API
    tags:
      - Database
      - SQL
      - PostgreSQL
      - Distributed SQL
      - Query Language
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://docs.yugabyte.com/stable/api/ysql/
    properties:
      - url: https://docs.yugabyte.com/stable/api/ysql/
        type: Documentation
    description: >-
      YSQL (Yugabyte Structured Query Language) is YugabyteDB's fully relational
      SQL API that is wire-compatible with PostgreSQL. It is designed for RDBMS
      workloads that require horizontal write scalability and globally distributed
      ACID transactions while retaining relational features such as JOINs, foreign
      keys, and secondary indexes. Applications connect to YSQL using standard
      PostgreSQL client libraries and drivers over port 5433. The API supports the
      broad PostgreSQL syntax and semantics, making it straightforward to migrate
      existing PostgreSQL workloads to a distributed database environment.

  - aid: yugabytedb:ycql-api
    name: YugabyteDB YCQL API
    tags:
      - Database
      - Cassandra
      - NoSQL
      - Distributed SQL
      - Query Language
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://docs.yugabyte.com/stable/api/ycql/
    properties:
      - url: https://docs.yugabyte.com/stable/api/ycql/
        type: Documentation
    description: >-
      YCQL (Yugabyte Cloud Query Language) is YugabyteDB's semi-relational SQL API
      with roots in Apache Cassandra Query Language. It is designed for
      internet-scale OLTP and HTAP applications that demand rapid data ingestion,
      multi-shard distributed transactions, and low-latency reads. YCQL includes
      native JSON column support and connects over port 9042 using CQL-compatible
      drivers. Applications previously built on Apache Cassandra can migrate to
      YCQL to benefit from YugabyteDB's distributed transaction semantics and
      consistent replication model while retaining familiar query patterns.

common:
  - url: json-ld/yugabytedb-context.jsonld
    type: JSON-LD
  - url: json-schema/yugabytedb-cluster-schema.json
    type: JSONSchema

