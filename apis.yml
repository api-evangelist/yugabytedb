  - aid: yugabytedb:anywhere
    name: YugabyteDB Anywhere REST API
    description: The YugabyteDB Anywhere REST API enables programmatic management of self-managed YugabyteDB deployments through
      the YugabyteDB Anywhere (YBA) control plane. It supports creating and managing cloud provider configurations, deploying
      and managing universes (database clusters), pausing and resuming universes, performing software upgrades, executing backups
      and restores, and resizing nodes. Authentication is performed via the X-AUTH-YW-API-TOKEN HTTP header.
    humanURL: https://docs.yugabyte.com/stable/yugabyte-platform/anywhere-automation/anywhere-api/
    baseURL: http://{ybaHost}/api/v1
    tags:
    - Anywhere
    - Backups
    - Distributed SQL
    - Self-Managed
    - Universes
    properties:
    - type: OpenAPI
      url: https://raw.githubusercontent.com/api-evangelist/yugabytedb/refs/heads/main/openapi/yugabytedb-anywhere-v1-universes.yaml
