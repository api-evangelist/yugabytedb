      security:
      - apiKeyAuth: []
      summary: YugabyteDB Anywhere Get High Availability Config
      tags:
      - HA
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      description: Available since YBA version 2.20.0.
      operationId: createHAConfig
      parameters:
      - in: query
        name: request
        schema: {}
        example: example-request
      requestBody:
