naftiko: "1.0.0-alpha1"

info:
  label: "YugabyteDB Anywhere v1 Backups, Restores, and Replication"
  description: >-
    Backup, restore, and replication subset of the YugabyteDB Anywhere v1
    REST API. Covers backup catalog, on-demand and scheduled backups, restore
    operations and preflight checks, schedules, customer storage configs,
    xCluster replication, and disaster recovery (DR) configurations including
    failover, switchover, pause, and resume.
  tags:
    - YugabyteDB
    - Anywhere
    - Backups
    - Restore
    - Replication
    - Disaster Recovery
    - xCluster
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      YBA_API_TOKEN: YBA_API_TOKEN
      YBA_HOST: YBA_HOST

capability:
  consumes:
    - type: http
      namespace: anywhere-backups
      baseUri: "{{YBA_HOST}}"
      description: "YugabyteDB Anywhere v1 backups, restores, and replication API."
      authentication:
        type: apikey
        key: X-AUTH-YW-API-TOKEN
        value: "{{YBA_API_TOKEN}}"
        placement: header
      resources:

        - name: backups
          path: /api/v1/customers/{cUUID}/backups
          description: "Backup catalog and creation"
          operations:
            - name: create-backup
              method: POST
              description: "Trigger an on-demand backup"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                  description: "Customer UUID"
              body:
                type: json
                data:
                  universeUUID: "{{tools.universeUUID}}"
                  storageConfigUUID: "{{tools.storageConfigUUID}}"
                  backupType: "{{tools.backupType}}"
                  keyspaceTableList: "{{tools.keyspaceTableList}}"
                  timeBeforeDelete: "{{tools.timeBeforeDelete}}"
                  sse: "{{tools.sse}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-backups
              method: DELETE
              description: "Delete one or more backups"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: backups-page
          path: /api/v1/customers/{cUUID}/backups/page
          description: "Paginated backup listing"
          operations:
            - name: list-backups-v2
              method: POST
              description: "Page through backups (v2)"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  filter: "{{tools.filter}}"
                  sortBy: "{{tools.sortBy}}"
                  direction: "{{tools.direction}}"
                  offset: "{{tools.offset}}"
                  limit: "{{tools.limit}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: backup-by-id
          path: /api/v1/customers/{cUUID}/backups/{backupUUID}
          description: "Individual backup record"
          operations:
            - name: get-backup
              method: GET
              description: "Get a backup by UUID"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: backupUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: edit-backup
              method: PUT
              description: "Edit a backup record"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: backupUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  timeBeforeDeleteFromPresentInMillis: "{{tools.timeBeforeDeleteFromPresentInMillis}}"
                  storageConfigUUID: "{{tools.storageConfigUUID}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: backup-stop
          path: /api/v1/customers/{cUUID}/backups/{backupUUID}/stop
          description: "Stop an in-progress backup"
          operations:
            - name: stop-backup
              method: POST
              description: "Stop an in-progress backup"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: backupUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: backup-increments
          path: /api/v1/customers/{cUUID}/backups/{backupUUID}/list_increments
          description: "Incremental backups under a base backup"
          operations:
            - name: list-incremental-backups
              method: GET
              description: "List incremental backups for a base backup"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: backupUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: customer-configs
          path: /api/v1/customers/{cUUID}/configs
          description: "Customer storage configurations for backups"
          operations:
            - name: list-customer-configs
              method: GET
              description: "List customer storage configurations"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-customer-config
              method: POST
              description: "Create a customer storage configuration"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  type: "{{tools.type}}"
                  name: "{{tools.name}}"
                  configName: "{{tools.configName}}"
                  data: "{{tools.data}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: customer-config-by-id
          path: /api/v1/customers/{cUUID}/configs/{configUUID}
          description: "Individual customer storage configuration"
          operations:
            - name: edit-customer-config
              method: PUT
              description: "Edit a customer storage configuration"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: configUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  data: "{{tools.data}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-customer-config
              method: DELETE
              description: "Delete a customer storage configuration"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: configUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: schedules
          path: /api/v1/customers/{cUUID}/schedules
          description: "Backup schedules"
          operations:
            - name: list-schedules
              method: GET
              description: "List all backup schedules"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: backup-schedules
          path: /api/v1/customers/{cUUID}/create_backup_schedule_async
          description: "Async backup schedule creation"
          operations:
            - name: create-backup-schedule
              method: POST
              description: "Create a recurring backup schedule (async)"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  universeUUID: "{{tools.universeUUID}}"
                  storageConfigUUID: "{{tools.storageConfigUUID}}"
                  scheduleName: "{{tools.scheduleName}}"
                  schedulingFrequency: "{{tools.schedulingFrequency}}"
                  cronExpression: "{{tools.cronExpression}}"
                  backupType: "{{tools.backupType}}"
                  keyspaceTableList: "{{tools.keyspaceTableList}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: schedule-toggle
          path: /api/v1/customers/{cUUID}/universes/{uniUUID}/schedules/{sUUID}/pause_resume
          description: "Pause or resume a backup schedule"
          operations:
            - name: toggle-backup-schedule
              method: PUT
              description: "Pause or resume a backup schedule"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
                - name: sUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: restore
          path: /api/v1/customers/{cUUID}/restore
          description: "Restore a backup (v2)"
          operations:
            - name: restore-backup
              method: POST
              description: "Restore from a backup"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  universeUUID: "{{tools.universeUUID}}"
                  storageConfigUUID: "{{tools.storageConfigUUID}}"
                  backupStorageInfoList: "{{tools.backupStorageInfoList}}"
                  kmsConfigUUID: "{{tools.kmsConfigUUID}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: restore-page
          path: /api/v1/customers/{cUUID}/restore/page
          description: "Paginated restore listing"
          operations:
            - name: list-restores
              method: POST
              description: "Page through restore records"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  filter: "{{tools.filter}}"
                  offset: "{{tools.offset}}"
                  limit: "{{tools.limit}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: restore-preflight
          path: /api/v1/customers/{cUUID}/restore/preflight
          description: "Run a restore preflight"
          operations:
            - name: restore-preflight
              method: POST
              description: "Run a restore preflight check"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  storageConfigUUID: "{{tools.storageConfigUUID}}"
                  universeUUID: "{{tools.universeUUID}}"
                  backupLocations: "{{tools.backupLocations}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: xcluster-configs
          path: /api/v1/customers/{cUUID}/xcluster_configs
          description: "xCluster (asynchronous) replication configurations"
          operations:
            - name: create-xcluster-config
              method: POST
              description: "Create an xCluster configuration"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  sourceUniverseUUID: "{{tools.sourceUniverseUUID}}"
                  targetUniverseUUID: "{{tools.targetUniverseUUID}}"
                  tables: "{{tools.tables}}"
                  configType: "{{tools.configType}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: xcluster-config-by-id
          path: /api/v1/customers/{cUUID}/xcluster_configs/{xccUUID}
          description: "Individual xCluster configuration"
          operations:
            - name: get-xcluster-config
              method: GET
              description: "Get an xCluster configuration"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: xccUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: edit-xcluster-config
              method: PUT
              description: "Edit an xCluster configuration"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: xccUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  status: "{{tools.status}}"
                  tables: "{{tools.tables}}"
                  sourceUniverseUUID: "{{tools.sourceUniverseUUID}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-xcluster-config
              method: DELETE
              description: "Delete an xCluster configuration"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: xccUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: dr-configs
          path: /api/v1/customers/{cUUID}/dr_configs
          description: "Disaster recovery configurations"
          operations:
            - name: create-dr-config
              method: POST
              description: "Create a disaster recovery configuration"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  sourceUniverseUUID: "{{tools.sourceUniverseUUID}}"
                  targetUniverseUUID: "{{tools.targetUniverseUUID}}"
                  dbs: "{{tools.dbs}}"
                  bootstrapParams: "{{tools.bootstrapParams}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: dr-config-by-id
          path: /api/v1/customers/{cUUID}/dr_configs/{drUUID}
          description: "Individual DR configuration"
          operations:
            - name: get-dr-config
              method: GET
              description: "Get a DR configuration"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: drUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: dr-failover
          path: /api/v1/customers/{cUUID}/dr_configs/{drUUID}/failover
          description: "DR failover"
          operations:
            - name: failover-dr-config
              method: POST
              description: "Perform an unplanned failover"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: drUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  primaryUniverseUuid: "{{tools.primaryUniverseUuid}}"
                  drReplicaUniverseUuid: "{{tools.drReplicaUniverseUuid}}"
                  namespaceIdSafetimeEpochUsMap: "{{tools.namespaceIdSafetimeEpochUsMap}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: dr-switchover
          path: /api/v1/customers/{cUUID}/dr_configs/{drUUID}/switchover
          description: "DR switchover"
          operations:
            - name: switchover-dr-config
              method: POST
              description: "Perform a planned switchover"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: drUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: dr-pause
          path: /api/v1/customers/{cUUID}/dr_configs/{drUUID}/pause
          description: "Pause DR replication"
          operations:
            - name: pause-dr-config
              method: POST
              description: "Pause DR replication"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: drUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: dr-resume
          path: /api/v1/customers/{cUUID}/dr_configs/{drUUID}/resume
          description: "Resume DR replication"
          operations:
            - name: resume-dr-config
              method: POST
              description: "Resume DR replication"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: drUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: anywhere-backups-rest
      description: "Standalone REST adapter exposing the Anywhere backup, restore, and replication API."
      resources:
        - path: /v1/customers/{customerId}/backups
          name: backups
          description: "Backups"
          operations:
            - method: POST
              name: create-backup
              description: "Trigger an on-demand backup"
              call: "anywhere-backups.create-backup"
              with:
                cUUID: "rest.customerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/backups/page
          name: backups-page
          description: "Paginated backup listing"
          operations:
            - method: POST
              name: list-backups
              description: "List backups paginated"
              call: "anywhere-backups.list-backups-v2"
              with:
                cUUID: "rest.customerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/backups/{backupId}
          name: backup-by-id
          description: "Individual backup"
          operations:
            - method: GET
              name: get-backup
              description: "Get a backup"
              call: "anywhere-backups.get-backup"
              with:
                cUUID: "rest.customerId"
                backupUUID: "rest.backupId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: edit-backup
              description: "Edit a backup"
              call: "anywhere-backups.edit-backup"
              with:
                cUUID: "rest.customerId"
                backupUUID: "rest.backupId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/backups/{backupId}/stop
          name: backup-stop
          description: "Stop a backup"
          operations:
            - method: POST
              name: stop-backup
              description: "Stop an in-progress backup"
              call: "anywhere-backups.stop-backup"
              with:
                cUUID: "rest.customerId"
                backupUUID: "rest.backupId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/backups/{backupId}/increments
          name: backup-increments
          description: "Incremental backups"
          operations:
            - method: GET
              name: list-incremental-backups
              description: "List incremental backups"
              call: "anywhere-backups.list-incremental-backups"
              with:
                cUUID: "rest.customerId"
                backupUUID: "rest.backupId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/storage-configs
          name: customer-configs
          description: "Storage configurations"
          operations:
            - method: GET
              name: list-storage-configs
              description: "List storage configurations"
              call: "anywhere-backups.list-customer-configs"
              with:
                cUUID: "rest.customerId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-storage-config
              description: "Create a storage configuration"
              call: "anywhere-backups.create-customer-config"
              with:
                cUUID: "rest.customerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/storage-configs/{configId}
          name: storage-config-by-id
          description: "Individual storage configuration"
          operations:
            - method: PUT
              name: edit-storage-config
              description: "Edit a storage configuration"
              call: "anywhere-backups.edit-customer-config"
              with:
                cUUID: "rest.customerId"
                configUUID: "rest.configId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-storage-config
              description: "Delete a storage configuration"
              call: "anywhere-backups.delete-customer-config"
              with:
                cUUID: "rest.customerId"
                configUUID: "rest.configId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/schedules
          name: schedules
          description: "Backup schedules"
          operations:
            - method: GET
              name: list-schedules
              description: "List backup schedules"
              call: "anywhere-backups.list-schedules"
              with:
                cUUID: "rest.customerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/backup-schedules
          name: backup-schedules
          description: "Create backup schedule"
          operations:
            - method: POST
              name: create-backup-schedule
              description: "Create a backup schedule"
              call: "anywhere-backups.create-backup-schedule"
              with:
                cUUID: "rest.customerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/universes/{universeId}/schedules/{scheduleId}/toggle
          name: schedule-toggle
          description: "Pause/resume schedule"
          operations:
            - method: PUT
              name: toggle-backup-schedule
              description: "Pause or resume a backup schedule"
              call: "anywhere-backups.toggle-backup-schedule"
              with:
                cUUID: "rest.customerId"
                uniUUID: "rest.universeId"
                sUUID: "rest.scheduleId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/restores
          name: restore
          description: "Restore"
          operations:
            - method: POST
              name: restore-backup
              description: "Restore a backup"
              call: "anywhere-backups.restore-backup"
              with:
                cUUID: "rest.customerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/restores/page
          name: restore-page
          description: "Restore listing"
          operations:
            - method: POST
              name: list-restores
              description: "List restores"
              call: "anywhere-backups.list-restores"
              with:
                cUUID: "rest.customerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/restores/preflight
          name: restore-preflight
          description: "Restore preflight"
          operations:
            - method: POST
              name: run-restore-preflight
              description: "Run a restore preflight"
              call: "anywhere-backups.restore-preflight"
              with:
                cUUID: "rest.customerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/xcluster-configs
          name: xcluster-configs
          description: "xCluster replication configs"
          operations:
            - method: POST
              name: create-xcluster-config
              description: "Create xCluster configuration"
              call: "anywhere-backups.create-xcluster-config"
              with:
                cUUID: "rest.customerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/xcluster-configs/{xclusterId}
          name: xcluster-config-by-id
          description: "Individual xCluster config"
          operations:
            - method: GET
              name: get-xcluster-config
              description: "Get xCluster configuration"
              call: "anywhere-backups.get-xcluster-config"
              with:
                cUUID: "rest.customerId"
                xccUUID: "rest.xclusterId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: edit-xcluster-config
              description: "Edit xCluster configuration"
              call: "anywhere-backups.edit-xcluster-config"
              with:
                cUUID: "rest.customerId"
                xccUUID: "rest.xclusterId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-xcluster-config
              description: "Delete xCluster configuration"
              call: "anywhere-backups.delete-xcluster-config"
              with:
                cUUID: "rest.customerId"
                xccUUID: "rest.xclusterId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/dr-configs
          name: dr-configs
          description: "Disaster recovery configs"
          operations:
            - method: POST
              name: create-dr-config
              description: "Create DR configuration"
              call: "anywhere-backups.create-dr-config"
