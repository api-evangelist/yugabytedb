naftiko: "1.0.0-alpha1"

info:
  label: "YugabyteDB Anywhere v1 Universe Management"
  description: >-
    Universe management subset of the YugabyteDB Anywhere v1 REST API. Covers
    universe lifecycle (create, list, get, delete), pause and resume,
    cluster operations (primary and read-only), tables, tablespaces, PITR
    configurations, software/GFlag/TLS/VM/systemd upgrades, restart and
    rollback, query monitoring, and YBC management. Authentication uses the
    X-AUTH-YW-API-TOKEN HTTP header.
  tags:
    - YugabyteDB
    - Anywhere
    - Universes
    - Self-Managed
    - Distributed SQL
    - Upgrades
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      YBA_API_TOKEN: YBA_API_TOKEN
      YBA_HOST: YBA_HOST

capability:
  consumes:
    - type: http
      namespace: anywhere-universes
      baseUri: "{{YBA_HOST}}"
      description: "YugabyteDB Anywhere v1 universe management API."
      authentication:
        type: apikey
        key: X-AUTH-YW-API-TOKEN
        value: "{{YBA_API_TOKEN}}"
        placement: header
      resources:

        - name: universes
          path: /api/v1/customers/{cUUID}/universes
          description: "Universe collection"
          operations:
            - name: list-universes
              method: GET
              description: "List universes for a customer"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                  description: "Customer UUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-all-clusters
              method: POST
              description: "Create a universe with all clusters"
              path: /clusters
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  clusters: "{{tools.clusters}}"
                  nodeDetailsSet: "{{tools.nodeDetailsSet}}"
                  rootCA: "{{tools.rootCA}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: import-universe
              method: POST
              description: "Import an existing universe into Anywhere"
              path: /import
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  universeUUID: "{{tools.universeUUID}}"
                  masterAddresses: "{{tools.masterAddresses}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: universe-by-id
          path: /api/v1/customers/{cUUID}/universes/{uniUUID}
          description: "Individual universe"
          operations:
            - name: get-universe
              method: GET
              description: "Get universe details"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
                  description: "Universe UUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-universe
              method: DELETE
              description: "Delete a universe"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
                - name: isForceDelete
                  in: query
                  type: boolean
                  required: false
                  description: "Force delete even if some operations fail"
                - name: isDeleteBackups
                  in: query
                  type: boolean
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: universe-status
          path: /api/v1/customers/{cUUID}/universes/{uniUUID}/status
          description: "Universe status"
          operations:
            - name: universe-status
              method: GET
              description: "Get current status of a universe"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: universe-pause
          path: /api/v1/customers/{cUUID}/universes/{uniUUID}/pause
          description: "Pause a universe"
          operations:
            - name: pause-universe
              method: POST
              description: "Pause a running universe"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: universe-resume
          path: /api/v1/customers/{cUUID}/universes/{uniUUID}/resume
          description: "Resume a paused universe"
          operations:
            - name: resume-universe
              method: POST
              description: "Resume a paused universe"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: universe-health-check
          path: /api/v1/customers/{cUUID}/universes/{uniUUID}/health_check
          description: "Run a health check"
          operations:
            - name: health-check-universe
              method: GET
              description: "Run a health check on a universe"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: trigger-health-check
              method: GET
              description: "Trigger an asynchronous health check"
              path: /trigger_health_check
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: universe-clusters-primary
          path: /api/v1/customers/{cUUID}/universes/{uniUUID}/clusters/primary
          description: "Primary cluster operations"
          operations:
            - name: update-primary-cluster
              method: PUT
              description: "Update the primary cluster"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  clusters: "{{tools.clusters}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: universe-clusters-read-only
          path: /api/v1/customers/{cUUID}/universes/{uniUUID}/clusters/read_only
          description: "Read-only cluster operations"
          operations:
            - name: create-read-only-cluster
              method: POST
              description: "Add a read-only cluster"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  clusters: "{{tools.clusters}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-read-only-cluster
              method: PUT
              description: "Update the read-only cluster"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  clusters: "{{tools.clusters}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-readonly-cluster
              method: DELETE
              description: "Delete a read-only cluster"
              path: /{clustUUID}
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
                - name: clustUUID
                  in: path
                  type: string
                  required: true
                  description: "Cluster UUID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: universe-tables
          path: /api/v1/customers/{cUUID}/universes/{uniUUID}/tables
          description: "Tables in a universe"
          operations:
            - name: get-all-tables
              method: GET
              description: "List all tables in a universe"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
                - name: includeParentTableInfo
                  in: query
                  type: boolean
                  required: false
                - name: includeColocatedParentTables
                  in: query
                  type: boolean
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-table
              method: POST
              description: "Create a table in a universe"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  tableType: "{{tools.tableType}}"
                  tableName: "{{tools.tableName}}"
                  keyspace: "{{tools.keyspace}}"
                  ttlInSeconds: "{{tools.ttlInSeconds}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: universe-pitr-configs
          path: /api/v1/customers/{cUUID}/universes/{uniUUID}/pitr_config
          description: "Point-in-time recovery configurations"
          operations:
            - name: list-pitr-configs
              method: GET
              description: "List PITR configurations for a universe"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: universe-pitr-action
          path: /api/v1/customers/{cUUID}/universes/{uniUUID}/pitr
          description: "Execute a PITR recovery"
          operations:
            - name: perform-pitr
              method: POST
              description: "Perform a point-in-time recovery"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  pitrConfigUUID: "{{tools.pitrConfigUUID}}"
                  restoreTimeInMillis: "{{tools.restoreTimeInMillis}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: universe-upgrade-software
          path: /api/v1/customers/{cUUID}/universes/{uniUUID}/upgrade/software
          description: "Software upgrade"
          operations:
            - name: upgrade-software
              method: POST
              description: "Upgrade YugabyteDB software on a universe"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  ybSoftwareVersion: "{{tools.ybSoftwareVersion}}"
                  upgradeOption: "{{tools.upgradeOption}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: universe-upgrade-gflags
          path: /api/v1/customers/{cUUID}/universes/{uniUUID}/upgrade/gflags
          description: "GFlag upgrade"
          operations:
            - name: upgrade-gflags
              method: POST
              description: "Upgrade GFlags on a universe"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  masterGFlags: "{{tools.masterGFlags}}"
                  tserverGFlags: "{{tools.tserverGFlags}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: universe-upgrade-restart
          path: /api/v1/customers/{cUUID}/universes/{uniUUID}/upgrade/restart
          description: "Restart upgrade"
          operations:
            - name: restart-universe
              method: POST
              description: "Rolling restart of a universe"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: universe-upgrade-rollback
          path: /api/v1/customers/{cUUID}/universes/{uniUUID}/upgrade/rollback
          description: "Rollback an upgrade"
          operations:
            - name: rollback-upgrade
              method: POST
              description: "Rollback the most recent software upgrade"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: universe-upgrade-finalize
          path: /api/v1/customers/{cUUID}/universes/{uniUUID}/upgrade/finalize
          description: "Finalize a software upgrade"
          operations:
            - name: finalize-upgrade
              method: POST
              description: "Finalize a software upgrade"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: universe-upgrade-tls
          path: /api/v1/customers/{cUUID}/universes/{uniUUID}/upgrade/tls
          description: "TLS upgrade"
          operations:
            - name: upgrade-tls
              method: POST
              description: "Toggle or upgrade TLS configuration"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  enableNodeToNodeEncrypt: "{{tools.enableNodeToNodeEncrypt}}"
                  enableClientToNodeEncrypt: "{{tools.enableClientToNodeEncrypt}}"
                  rootCA: "{{tools.rootCA}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: universe-upgrade-resize-node
          path: /api/v1/customers/{cUUID}/universes/{uniUUID}/upgrade/resize_node
          description: "Resize universe nodes"
          operations:
            - name: resize-node
              method: POST
              description: "Resize the node instances of a universe"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  clusters: "{{tools.clusters}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: universe-run-query
          path: /api/v1/customers/{cUUID}/universes/{uniUUID}/run_query
          description: "Run a YSQL query"
          operations:
            - name: run-ysql-query
              method: POST
              description: "Run an arbitrary YSQL query against a universe"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  db_name: "{{tools.db_name}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: universe-live-queries
          path: /api/v1/customers/{cUUID}/universes/{uniUUID}/live_queries
          description: "Live query monitoring"
          operations:
            - name: get-live-queries
              method: GET
              description: "List currently executing queries on the universe"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: universe-slow-queries
          path: /api/v1/customers/{cUUID}/universes/{uniUUID}/slow_queries
          description: "Slow query monitoring"
          operations:
            - name: get-slow-queries
              method: GET
              description: "List slow queries on the universe"
              inputParameters:
                - name: cUUID
                  in: path
                  type: string
                  required: true
                - name: uniUUID
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: anywhere-universes-rest
      description: "Standalone REST adapter exposing the Anywhere v1 universe management API."
      resources:
        - path: /v1/customers/{customerId}/universes
          name: universes
          description: "Universe collection"
          operations:
            - method: GET
              name: list-universes
              description: "List universes"
              call: "anywhere-universes.list-universes"
              with:
                cUUID: "rest.customerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/universes/clusters
          name: universe-clusters
          description: "Create universe with clusters"
          operations:
            - method: POST
              name: create-universe
              description: "Create a universe"
              call: "anywhere-universes.create-all-clusters"
              with:
                cUUID: "rest.customerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/universes/{universeId}
          name: universe-by-id
          description: "Individual universe"
          operations:
            - method: GET
              name: get-universe
              description: "Get a universe"
              call: "anywhere-universes.get-universe"
              with:
                cUUID: "rest.customerId"
                uniUUID: "rest.universeId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-universe
              description: "Delete a universe"
              call: "anywhere-universes.delete-universe"
              with:
                cUUID: "rest.customerId"
                uniUUID: "rest.universeId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/universes/{universeId}/status
          name: universe-status
          description: "Universe status"
          operations:
            - method: GET
              name: get-universe-status
              description: "Get universe status"
              call: "anywhere-universes.universe-status"
              with:
                cUUID: "rest.customerId"
                uniUUID: "rest.universeId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/universes/{universeId}/pause
          name: universe-pause
          description: "Pause a universe"
          operations:
            - method: POST
              name: pause-universe
              description: "Pause a universe"
              call: "anywhere-universes.pause-universe"
              with:
                cUUID: "rest.customerId"
                uniUUID: "rest.universeId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/universes/{universeId}/resume
          name: universe-resume
          description: "Resume a universe"
          operations:
            - method: POST
              name: resume-universe
              description: "Resume a universe"
              call: "anywhere-universes.resume-universe"
              with:
                cUUID: "rest.customerId"
                uniUUID: "rest.universeId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/universes/{universeId}/health-check
          name: universe-health-check
          description: "Health check"
          operations:
            - method: GET
              name: get-health-check
              description: "Get health check results"
              call: "anywhere-universes.health-check-universe"
              with:
                cUUID: "rest.customerId"
                uniUUID: "rest.universeId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/universes/{universeId}/clusters/primary
          name: universe-primary-cluster
          description: "Primary cluster"
          operations:
            - method: PUT
              name: update-primary-cluster
              description: "Update the primary cluster"
              call: "anywhere-universes.update-primary-cluster"
              with:
                cUUID: "rest.customerId"
                uniUUID: "rest.universeId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/universes/{universeId}/clusters/read-only
          name: universe-readonly-cluster
          description: "Read-only cluster"
          operations:
            - method: POST
              name: create-readonly-cluster
              description: "Create a read-only cluster"
              call: "anywhere-universes.create-read-only-cluster"
              with:
                cUUID: "rest.customerId"
                uniUUID: "rest.universeId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-readonly-cluster
              description: "Update the read-only cluster"
              call: "anywhere-universes.update-read-only-cluster"
              with:
                cUUID: "rest.customerId"
                uniUUID: "rest.universeId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/universes/{universeId}/tables
          name: universe-tables
          description: "Universe tables"
          operations:
            - method: GET
              name: list-tables
              description: "List tables"
              call: "anywhere-universes.get-all-tables"
              with:
                cUUID: "rest.customerId"
                uniUUID: "rest.universeId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-table
              description: "Create a table"
              call: "anywhere-universes.create-table"
              with:
                cUUID: "rest.customerId"
                uniUUID: "rest.universeId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/universes/{universeId}/pitr-configs
          name: universe-pitr-configs
          description: "PITR configurations"
          operations:
            - method: GET
              name: list-pitr-configs
              description: "List PITR configurations"
              call: "anywhere-universes.list-pitr-configs"
              with:
                cUUID: "rest.customerId"
                uniUUID: "rest.universeId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/universes/{universeId}/pitr
          name: universe-pitr
          description: "Perform PITR"
          operations:
            - method: POST
              name: perform-pitr
              description: "Perform PITR recovery"
              call: "anywhere-universes.perform-pitr"
              with:
                cUUID: "rest.customerId"
                uniUUID: "rest.universeId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/universes/{universeId}/upgrade-software
          name: universe-upgrade-software
          description: "Software upgrade"
          operations:
            - method: POST
              name: upgrade-software
              description: "Upgrade YugabyteDB software"
              call: "anywhere-universes.upgrade-software"
              with:
                cUUID: "rest.customerId"
                uniUUID: "rest.universeId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/customers/{customerId}/universes/{universeId}/upgrade-gflags
          name: universe-upgrade-gflags
          description: "GFlag upgrade"
          operations:
            - method: POST
              name: upgrade-gflags
              description: "Upgrade GFlags"
              call: "anywhere-universes.upgrade-gflags"
              with:
                cUUID: "rest.customerId"
                uniUUID: "rest.universeId"
              outputParameters:
                - type: object
                  mapping: "$."
